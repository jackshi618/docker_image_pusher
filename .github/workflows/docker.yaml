name: Docker

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  schedule:
    # 每天 UTC 时间 3:00 执行（北京时间 11:00）
    - cron: '0 3 * * *'


env:
  ALIYUN_REGISTRY: "${{ secrets.ALIYUN_REGISTRY }}"
  ALIYUN_NAME_SPACE: "${{ secrets.ALIYUN_NAME_SPACE }}"
  ALIYUN_REGISTRY_USER: "${{ secrets.ALIYUN_REGISTRY_USER }}"
  ALIYUN_REGISTRY_PASSWORD: "${{ secrets.ALIYUN_REGISTRY_PASSWORD }}"

jobs:

  build:
    name: Pull
    runs-on: ubuntu-latest
    steps:
    - name: Before freeing up disk space
      run: |
        echo "Before freeing up disk space"
        echo "=============================================================================="
        df -hT
        echo "=============================================================================="

    # 增加可用磁盘空间
    - name: Maximize build space
      uses: easimon/maximize-build-space@master
      with:

        root-reserve-mb: 2048
        swap-size-mb: 128
        remove-dotnet: 'true'
        remove-haskell: 'true'
        # 如果空间还是不够用，可以把以下开启，清理出更多空间
        # remove-android: 'true'
        # remove-codeql: 'true'
        build-mount-path: '/var/lib/docker/'

    - name: Restart docker
      run: sudo service docker restart

    - name: Free up disk space complete
      run: |
        echo "Free up disk space complete"
        echo "=============================================================================="
        df -hT
        echo "=============================================================================="

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Docker Setup Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push image Aliyun
      timeout-minutes: 120
      run: |
        set -euo pipefail  # 启用严格错误处理
        
        # 使用更安全的方式登录，避免密码出现在日志
        echo "$ALIYUN_REGISTRY_PASSWORD" | docker login -u "$ALIYUN_REGISTRY_USER" --password-stdin "$ALIYUN_REGISTRY" || {
          echo "❌ Docker login failed"
          exit 1
        }
        
        # 统计变量
        success_count=0
        fail_count=0
        failed_images=()
        
        # 镜像解析函数，避免代码重复
        parse_image() {
          local line="$1"
          local image=$(echo "$line" | awk '{print $NF}')
          image="${image%%@*}"  # 删除 @sha256: 等字符
          
          local image_name_tag=$(echo "$image" | awk -F'/' '{print $NF}')
          local name_space=$(echo "$image" | awk -F'/' '{if (NF==3) print $2; else if (NF==2) print $1; else print ""}')
          local image_name=$(echo "$image_name_tag" | awk -F':' '{print $1}')
          
          echo "$image|$image_name_tag|$name_space|$image_name"
        }
        
        # 数据预处理,判断镜像是否重名
        declare -A duplicate_images
        declare -A temp_map
        echo "📋 开始分析镜像列表..."
        while IFS= read -r line || [ -n "$line" ]; do
            # 忽略空行与注释
            [[ -z "$line" ]] && continue
            if echo "$line" | grep -q '^\s*#'; then
                continue
            fi
            
            IFS='|' read -r image image_name_tag name_space image_name <<< "$(parse_image "$line")"
            name_space="${name_space}_"  # 避免空值影响判断
            
            # 如果镜像存在于数组中，则添加temp_map
            # 使用 -v 检查关联数组键是否存在（兼容 set -u）
            if [[ -v temp_map[$image_name] ]]; then
                 # 如果temp_map已经存在镜像名，判断是不是同一命名空间
                 if [[ "${temp_map[$image_name]}" != "$name_space" ]]; then
                    echo "⚠️  检测到重名镜像: $image_name"
                    duplicate_images[$image_name]="true"
                 fi
            else
                # 存镜像的命名空间
                temp_map[$image_name]="$name_space"
            fi       
        done < images.txt
        echo "✅ 镜像分析完成"
        echo ""
        
        # 处理每个镜像
        while IFS= read -r line || [ -n "$line" ]; do
            # 忽略空行与注释
            [[ -z "$line" ]] && continue
            if echo "$line" | grep -q '^\s*#'; then
                continue
            fi
        
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🔄 处理镜像: $line"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            
            # 解析镜像信息
            IFS='|' read -r image image_name_tag name_space image_name <<< "$(parse_image "$line")"
            
            # 解析平台架构
            platform=$(echo "$line" | awk -F'--platform[ =]' '{if (NF>1) print $2}' | awk '{print $1}')
            if [ -z "$platform" ]; then
                platform_prefix=""
            else
                platform_prefix="${platform//\//_}_"
            fi
            
            # 处理命名空间前缀
            name_space_prefix=""
            # 使用 -v 检查关联数组键是否存在（兼容 set -u）
            if [[ -v duplicate_images[$image_name] ]]; then
               if [[ -n "$name_space" ]]; then
                  name_space_prefix="${name_space}_"
               fi
            fi
            
            # 构建新镜像名称
            image_name_tag="${image_name_tag%%@*}"
            new_image="$ALIYUN_REGISTRY/$ALIYUN_NAME_SPACE/$platform_prefix$name_space_prefix$image_name_tag"
            
            # 拉取镜像（带重试）
            pull_success=false
            for attempt in {1..3}; do
              echo "📥 尝试拉取镜像 (第 $attempt 次)..."
              if timeout 1800 docker pull "$line" 2>&1; then
                pull_success=true
                break
              else
                echo "⚠️  拉取失败，等待 10 秒后重试..."
                sleep 10
              fi
            done
            
            if [ "$pull_success" = false ]; then
              echo "❌ 镜像拉取失败: $line"
              fail_count=$((fail_count + 1))
              failed_images+=("$line")
              continue
            fi
            
            # 打标签
            echo "🏷️  标记镜像: $image -> $new_image"
            if ! docker tag "$image" "$new_image"; then
              echo "❌ 镜像标记失败: $image"
              fail_count=$((fail_count + 1))
              failed_images+=("$line")
              docker rmi "$image" 2>/dev/null || true
              continue
            fi
            
            # 推送镜像（带重试）
            push_success=false
            for attempt in {1..3}; do
              echo "📤 尝试推送镜像 (第 $attempt 次)..."
              if timeout 1800 docker push "$new_image" 2>&1; then
                push_success=true
                break
              else
                echo "⚠️  推送失败，等待 10 秒后重试..."
                sleep 10
              fi
            done
            
            if [ "$push_success" = false ]; then
              echo "❌ 镜像推送失败: $new_image"
              fail_count=$((fail_count + 1))
              failed_images+=("$line")
            else
              echo "✅ 镜像推送成功: $new_image"
              success_count=$((success_count + 1))
            fi
            
            # 清理本地镜像（忽略错误，避免影响后续）
            echo "🧹 清理本地镜像..."
            docker rmi "$image" 2>/dev/null || true
            docker rmi "$new_image" 2>/dev/null || true
            
            # 显示磁盘空间
            echo "💾 当前磁盘使用情况:"
            df -hT | grep -E '^/dev/|Filesystem' || true
            echo ""
            
        done < images.txt
        
        # 输出统计信息
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "📊 处理完成统计"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "✅ 成功: $success_count"
        echo "❌ 失败: $fail_count"
        
        if [ $fail_count -gt 0 ]; then
          echo ""
          echo "失败的镜像列表:"
          for img in "${failed_images[@]}"; do
            echo "  - $img"
          done
          echo ""
          echo "⚠️  部分镜像处理失败，请检查日志"
          exit 1
        else
          echo ""
          echo "🎉 所有镜像处理成功！"
        fi
